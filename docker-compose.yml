version: "3.9"

services:
  backend:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - THRESHOLD_EUR=${THRESHOLD_EUR:-0.10}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: loki
      options:
        loki-url: "http://loki-master:3100/loki/api/v1/push"
        loki-external-labels: "service=elektri-vorg"